<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeeYouBuy - Best Affiliate Deals</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <h1>🛒 SeeYouBuy</h1>
            <p>Best Deals • Handpicked Products • Save Money</p>
            <a href="/admin" class="admin-link"><i class="fas fa-lock"></i> Admin</a>
        </div>
    </header>

    <!-- Filters -->
    <div class="filters container">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="electronics">📱 Electronics</button>
        <button class="filter-btn" data-category="fashion">👕 Fashion</button>
        <button class="filter-btn" data-category="home">🏠 Home</button>
        <button class="filter-btn" data-category="deals">🔥 Hot Deals</button>
    </div>

    <!-- Deal of the Day Banner -->
    <div class="deal-banner container" id="dealBanner" style="display:none;">
        <span class="badge">🔥 Deal of the Day</span>
        <div class="deal-content" id="dealContent"></div>
    </div>

    <!-- Products Grid -->
    <main class="container">
        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
            <div class="loading">Loading amazing deals...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>© 2026 SeeYouBuy • Affiliate Links • Prices may vary</p>
            <p class="disclaimer">We earn commission on purchases at no extra cost to you ❤️</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
