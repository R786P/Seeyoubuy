<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking - Apna Stock Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #667eea; margin-bottom: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #667eea; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        /*  FIX: Responsive Table Wrapper */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            min-width: 650px; /* Table ko squash hone se bachata hai */
            border-collapse: collapse;
        }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #667eea; color: white; font-weight: bold; white-space: nowrap; }
        tr:hover { background: #f8f9fa; }
        
        .status { padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; white-space: nowrap; }
        .status-shipped { background: #fff3cd; color: #856404; }
        .status-delivered { background: #d4edda; color: #155724; }
        .status-pending { background: #f8d7da; color: #721c24; }
        .tracking-id { font-family: monospace; background: #f8f9fa; padding: 2px 6px; border-radius: 4px; }
        
        @media (max-width: 768px) {
            th, td { padding: 8px 10px; font-size: 0.9rem; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/admin" class="back-link">← Back to Admin Panel</a>
        <h1>📦 Order Tracking</h1>
        
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Product</th>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Tracking ID</th>
                    </tr>
                </thead>
                <tbody id="ordersTable">
                    <tr><td colspan="6" style="text-align:center; padding: 20px;">Loading orders...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadOrders() {
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                
                const tbody = document.getElementById('ordersTable');
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px;">No orders yet</td></tr>';
                    return;
                }
                
                tbody.innerHTML = orders.map(order => `
                    <tr>
                        <td><strong>${order.id}</strong></td>
                        <td>${order.product}</td>
                        <td>${order.customer}</td>
                        <td>${order.date}</td>
                        <td><span class="status status-${order.status.toLowerCase()}">${order.status}</span></td>
                        <td><span class="tracking-id">${order.tracking_id}</span></td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('ordersTable').innerHTML = 
                    '<tr><td colspan="6" style="text-align:center; padding: 20px; color: #e74c3c;">Error loading orders</td></tr>';
            }
        }

        loadOrders();
    </script>
</body>
</html>
